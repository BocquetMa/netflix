<app-navbar></app-navbar>
<div class="content-page">
  <div class="page-header">
    <h1>Ma liste</h1>
    <p>Vos films et séries favoris</p>
  </div>
  <div *ngIf="myListMovies.length; else emptyList">
    <app-movie-row [title]="'Ma liste'" [movies]="myListMovies"></app-movie-row>
  </div>
  <ng-template #emptyList>
    <div class="empty-state">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
        <polyline points="17 21 17 13 7 13 7 21"></polyline>
        <polyline points="7 3 7 8 15 8"></polyline>
      </svg>
      <h2>Votre liste est vide</h2>
      <p>Ajoutez des films et séries à votre liste pour les retrouver facilement</p>
    </div>
  </ng-template>
</div>
