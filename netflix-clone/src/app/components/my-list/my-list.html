<app-navbar></app-navbar>
<div class="content-page">
  <div class="page-header">
    <div class="header-left">
      <h1>Ma liste</h1>
      <p>Vos films et séries favoris</p>
    </div>
    <button class="btn-share" (click)="shareList()" *ngIf="myListMovies.length">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="18" cy="5" r="3"></circle>
        <circle cx="6" cy="12" r="3"></circle>
        <circle cx="18" cy="19" r="3"></circle>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
      </svg>
      Partager ma liste
    </button>
  </div>

  <!-- Share toast / link display -->
  <div class="share-banner" *ngIf="shareLink">
    <div class="share-banner__content">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
      </svg>
      <span class="share-url">{{ shareLink }}</span>
      <span class="copied-badge" *ngIf="copied">✓ Lien copié !</span>
      <button class="btn-copy" (click)="shareList()" *ngIf="!copied">Copier</button>
    </div>
    <button class="btn-close-share" (click)="closeShare()">✕</button>
  </div>

  <div *ngIf="myListMovies.length; else emptyList">
    <app-movie-row [title]="'Ma liste'" [movies]="myListMovies"></app-movie-row>
  </div>
  <ng-template #emptyList>
    <div class="empty-state">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
        <polyline points="17 21 17 13 7 13 7 21"></polyline>
        <polyline points="7 3 7 8 15 8"></polyline>
      </svg>
      <h2>Votre liste est vide</h2>
      <p>Ajoutez des films et séries à votre liste pour les retrouver facilement</p>
    </div>
  </ng-template>
</div>
