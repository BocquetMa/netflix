<div class="profile-select">
  <h1>Qui regarde ?</h1>

  <div class="profiles-grid">
    <div
      *ngFor="let profile of profiles"
      class="profile-item"
      (click)="selectProfile(profile)"
    >
      <div class="profile-avatar" [class.kids]="profile.isKids">
        <img [src]="profile.avatar" [alt]="profile.name">
        <div class="kids-badge" *ngIf="profile.isKids">KIDS</div>
      </div>
      <p class="profile-name">{{ profile.name }}</p>
    </div>
  </div>

  <button class="btn-manage" (click)="manageProfiles()">Gérer les profils</button>
</div>
