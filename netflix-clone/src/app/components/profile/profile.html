<app-navbar></app-navbar>
<div class="profile-page">
  <div class="profile-container" *ngIf="currentUser">

    <div class="page-header">
      <h1>Gérer les profils</h1>
      <button class="btn-done" (click)="done()">Terminé</button>
    </div>

    <!-- Profiles grid -->
    <div class="profiles-grid" *ngIf="!editState">
      <div *ngFor="let profile of profiles" class="profile-card">
        <div class="profile-avatar" [class.kids]="profile.isKids">
          <img [src]="profile.avatar" [alt]="profile.name">
          <div class="kids-badge" *ngIf="profile.isKids">KIDS</div>
        </div>
        <p class="profile-name">{{ profile.name }}</p>
        <div class="profile-actions-row">
          <button class="btn-edit" (click)="startEdit(profile)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
            Modifier
          </button>
          <button class="btn-delete" (click)="deleteProfile(profile)" [disabled]="!canDelete()" [title]="!canDelete() ? 'Impossible de supprimer le seul profil' : ''">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
              <path d="M10 11v6"></path><path d="M14 11v6"></path>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
            </svg>
            Supprimer
          </button>
        </div>
      </div>

      <!-- Add profile card -->
      <div class="profile-card add-card" (click)="startAdd()" *ngIf="canAdd()">
        <div class="profile-avatar add-avatar">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#808080" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="16"></line>
            <line x1="8" y1="12" x2="16" y2="12"></line>
          </svg>
        </div>
        <p class="profile-name">Ajouter un profil</p>
      </div>
    </div>

    <!-- Edit / Add form -->
    <div class="edit-form" *ngIf="editState">
      <h2>{{ editState.profileId === null ? 'Ajouter un profil' : 'Modifier le profil' }}</h2>

      <div class="form-avatar-preview">
        <img [src]="avatarUrl(editState.avatarSeed)" alt="Avatar">
      </div>

      <div class="form-group">
        <label>Nom du profil</label>
        <input type="text" [(ngModel)]="editState.name" placeholder="Nom" maxlength="30">
      </div>

      <div class="form-group">
        <label>Avatar</label>
        <div class="avatar-picker">
          <div
            *ngFor="let seed of avatarSeeds"
            class="avatar-option"
            [class.selected]="editState.avatarSeed === seed"
            (click)="editState.avatarSeed = seed"
          >
            <img [src]="avatarUrl(seed)" [alt]="seed">
          </div>
        </div>
      </div>

      <div class="form-group toggle-group">
        <label>
          <input type="checkbox" [(ngModel)]="editState.isKids">
          <span>Profil Enfants</span>
        </label>
        <p class="toggle-hint">Limite le contenu aux contenus adaptés aux enfants.</p>
      </div>

      <div class="form-buttons">
        <button class="btn-save" (click)="saveEdit()" [disabled]="!editState.name.trim()">Enregistrer</button>
        <button class="btn-cancel" (click)="cancelEdit()">Annuler</button>
      </div>
    </div>

    <!-- Account section -->
    <div class="account-section" *ngIf="!editState">
      <div class="account-info">
        <p class="account-label">Compte</p>
        <p class="account-email">{{ currentUser.email }}</p>
      </div>
      <button class="btn-danger" (click)="logout()">Déconnexion</button>
    </div>

  </div>
</div>
