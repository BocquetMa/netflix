<div class="login-page">
  <div class="login-container">
    <div class="login-box">
      <h1 class="logo">NETSTREAM</h1>
      <h2>Connexion</h2>

      <div class="alert alert-error" *ngIf="error">
        {{ error }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <input
            type="email"
            formControlName="email"
            class="form-control"
            placeholder="Email"
            [class.is-invalid]="f['email'].invalid && f['email'].touched"
          />
          <div class="invalid-feedback" *ngIf="f['email'].invalid && f['email'].touched">
            <span *ngIf="f['email'].errors?.['required']">L'email est requis</span>
            <span *ngIf="f['email'].errors?.['email']">Email invalide</span>
          </div>
        </div>

        <div class="form-group">
          <input
            type="password"
            formControlName="password"
            class="form-control"
            placeholder="Mot de passe"
            [class.is-invalid]="f['password'].invalid && f['password'].touched"
          />
          <div class="invalid-feedback" *ngIf="f['password'].invalid && f['password'].touched">
            <span *ngIf="f['password'].errors?.['required']">Le mot de passe est requis</span>
            <span *ngIf="f['password'].errors?.['minlength']">Le mot de passe doit contenir au moins 4 caractères</span>
          </div>
        </div>

        <button type="submit" class="btn-login" [disabled]="loading || loginForm.invalid">
          <span *ngIf="!loading">Se connecter</span>
          <span *ngIf="loading">Connexion en cours...</span>
        </button>

        <div class="demo-info">
          <p><strong>Compte de démonstration :</strong></p>
          <p>Email : demo@netstream.com</p>
          <p>Mot de passe : demo123</p>
        </div>

        <div class="signup-link">
          <p>Nouveau sur NetStream ?  <a routerLink="/register">Inscrivez-vous maintenant</a></p>
        </div>
      </form>
    </div>
  </div>
</div>
