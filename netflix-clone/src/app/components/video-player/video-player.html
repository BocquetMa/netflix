<div class="video-player" *ngIf="movie">
  <button class="back-button" (click)="goBack()">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </button>

  <div class="player-container">
    <div class="video-placeholder">
      <div class="video-info">
        <svg width="100" height="100" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <h2>{{ movie.title }}</h2>
        <p>Simulation de lecteur vidéo</p>
        <p class="video-note">
          Dans une application réelle, on aurait ici un lecteur vidéo comme Video.js,
          Plyr ou un service de streaming comme YouTube.
        </p>
      </div>
    </div>

    <div class="player-controls">
      <div class="progress-bar">
        <div class="progress" style="width: 35%"></div>
      </div>
      <div class="controls-bottom">
        <div class="controls-left">
          <button class="control-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </button>
          <button class="control-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
          </button>
          <span class="time">0:35 / 2:15</span>
        </div>
        <div class="controls-right">
          <button class="control-btn">CC</button>
          <button class="control-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="23 7 16 12 23 17 23 7"></polygon>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
