<div class="player" *ngIf="movie" [class.hide-cursor]="!showControls">

  <!-- Backdrop -->
  <div class="player__backdrop"
    [style.background-image]="'url(' + movie.backdropUrl + ')'">
  </div>
  <div class="player__backdrop-overlay"></div>

  <!-- Scanlines -->
  <div class="player__scanlines"></div>

  <!-- Center "now playing" info -->
  <div class="player__center" [class.visible]="!isPlaying">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="white" opacity="0.6">
      <path d="M8 5v14l11-7z"/>
    </svg>
    <p class="player__paused-label">En pause</p>
  </div>

  <!-- Controls overlay -->
  <div class="player__controls" [class.visible]="showControls || !isPlaying">

    <!-- Top bar -->
    <div class="player__top">
      <button class="player__back" (click)="goBack()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="player__title">
        <span>{{ movie.title }}</span>
        <span class="player__subtitle">{{ movie.type === 'movie' ? 'Film' : 'Série' }} · {{ movie.year }}</span>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="player__progress-area">
      <div class="player__progress-bar" (click)="seek($event)">
        <div class="player__progress-fill" [style.width.%]="percent">
          <div class="player__progress-thumb"></div>
        </div>
      </div>
      <div class="player__time-row">
        <span>{{ currentTime }}</span>
        <span class="player__remaining">{{ remainingTime }}</span>
      </div>
    </div>

    <!-- Bottom controls -->
    <div class="player__bottom">
      <div class="player__left-controls">
        <!-- Skip back 10s -->
        <button class="ctrl-btn" (click)="skip(-10 / 6000 * 100)" title="Reculer 10s">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
          </svg>
          <span class="ctrl-btn__label">10</span>
        </button>

        <!-- Play / Pause -->
        <button class="ctrl-btn ctrl-btn--play" (click)="togglePlay()">
          <svg *ngIf="isPlaying" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
          <svg *ngIf="!isPlaying" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </button>

        <!-- Skip forward 10s -->
        <button class="ctrl-btn" (click)="skip(10 / 6000 * 100)" title="Avancer 10s">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
          </svg>
          <span class="ctrl-btn__label">10</span>
        </button>

        <!-- Volume -->
        <div class="volume-group">
          <button class="ctrl-btn" (click)="toggleMute()">
            <svg *ngIf="!isMuted && volume > 0" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
            </svg>
            <svg *ngIf="isMuted || volume === 0" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
          </button>
          <input type="range" class="volume-slider" min="0" max="100"
            [(ngModel)]="volume" (ngModelChange)="isMuted = volume === 0">
        </div>
      </div>

      <div class="player__right-controls">
        <span class="player__progress-pct">{{ percent | number:'1.0-0' }}%</span>
        <button class="ctrl-btn ctrl-btn--text">CC</button>
        <button class="ctrl-btn" title="Plein écran">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
      </div>
    </div>

  </div><!-- /controls -->

</div>

<div class="player player--loading" *ngIf="!movie">
  <div class="spinner"></div>
</div>
